name: gabarita_app
description: Aplicativo educacional para resolucao de questoes e simulados offline.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  sqflite: ^2.3.3
  path: ^1.9.0

  sensors_plus: ^5.0.1
  geolocator: ^13.0.1
  image_picker: ^1.1.2

  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  home_widget: ^0.7.0
  fl_chart: ^0.70.2
  provider: ^6.1.2
  permission_handler: ^11.3.1

  intl: ^0.19.0
  shared_preferences: ^2.3.3
  uuid: ^4.4.2

  cupertino_icons: ^1.0.8
  flutter_markdown_plus: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  sqflite_common_ffi: ^2.3.3+1

flutter:
  uses-material-design: true
  assets:
    - assets/data/
